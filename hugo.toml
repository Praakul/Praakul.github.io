baseURL = 'https://praakul.github.io/'
languageCode = 'en-us'
title = 'Prajwal Kulkarni'
theme = 'terminal'

[params.logo]
  logoText = ">"

[params]
  # These two lines center the layout
  fullWidthTheme = false
  centerTheme = true
  
  # This told the homepage to show your projects. We change it to something else
  # so it doesn't show any posts by default, only the _index.md content.
  contentTypeName = 'pinned'
  showMenuItems = 2
  
  subtitle = 'Machine Learning Engineer. Specializing in Computer Vision, Deep Learning, and C++.'

  # Use only handles, not full URLs! The theme builds the links for you.
  [params.twitter]
    twitter = "Praakul_"
  [params.linkedin]
    linkedin = "praakul"
  [params.github]
    github = "Praakul"

[[menu.main]]
  name = "Projects"
  url = "/posts/"

[[menu.main]]
  name = "About"
  url = "/about/"