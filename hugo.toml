baseURL = 'https://praakul.github.io/'
languageCode = 'en-us'
title = 'Prajwal Kulkarni | Terminal'
theme = 'terminal'

[params]
  # These two lines center the layout
  fullWidthTheme = false
  centerTheme = true
  
  # This tells the homepage to show your projects
  contentTypeName = 'posts'
  showMenuItems = 2
  
  subtitle = 'Machine Learning Engineer. Specializing in Computer Vision, Deep Learning, and C++.'

  # Use only handles, not full URLs! The theme builds the links for you.
  [params.twitter]
    twitter = "Praakul_"
  [params.linkedin]
    linkedin = "praakul"
  [params.github]
    github = "Praakul"

[[menu.main]]
  name = "Projects"
  url = "/posts/"

[[menu.main]]
  name = "About"
  url = "/about/"