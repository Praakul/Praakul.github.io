  # ─── Hero ───────────────────────────────────────────────
  hero:
    enable: true
    intro: "Hi, my name is"
    title: "Prajwal Kulkarni."
    subtitle: "Machine Learning Engineer"
    content: "Specializing in Deep Learning, Computer Vision and Agentic AI along with strong intereset in C++. I build AI systems from the ground up — from model architecture to production deployment."
