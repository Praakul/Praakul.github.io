  # ─── About ──────────────────────────────────────────────
  about:
    enable: true
    title: "About Me"
    image: "/self_photo_four_is_to_three.jpeg"
    content: |-
      I am a Machine Learning Engineer with a BE in Electronics and Communication Engineering from KLS Gogte Institute of Technology. I specialize in bridging the gap between AI and low-level system optimization.

      My work focuses on Computer Vision, Deep Learning, and Agentic AI frameworks. I build models from scratch using PyTorch and deploy them into production with Docker and FastAPI. Beyond training models, I'm comfortable in Linux environments, writing C/C++, and building robust CI/CD pipelines.
    skills:
      enable: true
      title: "Technologies I work with:"
      items:
        - "Python"
        - "PyTorch"
        - "OpenCV"
        - "FastAPI"
        - "Docker"
        - "Linux"
        - "C/C++"
        - "Git/GitHub"

  # ─── Experience ─────────────────────────────────────────
  experience:
    enable: true
    items:
      - company: "AIIMS Delhi"
        companyUrl: "https://www.aiims.edu/"
        jobs:
          - name: "Research Intern — Dept. of Neurosurgery"
            date: "May 2025 - Sept 2025"
            content: |
              - Created a standalone application for automated evaluation of craniotomy training samples with integrated report generation and Grad-CAM interpretability visualizations.
              - Engineered an agentic AI framework for assessment of cylindrical suturing samples with multi-modal mechanisms.
              - Implemented eye-tracking integration for endoscopy sensor fusion in surgical navigation workflows.

      - company: "IIT Delhi"
        companyUrl: "https://home.iitd.ac.in/"
        jobs:
          - name: "Graphics & Vision Summer School"
            date: "May 2024 - June 2024"
            content: |
              Completed coursework in image processing, computer vision, machine learning and rendering techniques.

              - Applied CNNs for visual recognition tasks and feature extraction pipelines.
              - Explored ray-tracing algorithms and photorealistic rendering for 3D graphics synthesis.
              - Constructed multi-image house price prediction model combining visual features with regression.

